<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BNR — Bank Licensing Portal</title>
  <link rel="stylesheet" href="/css/main.css"/>
</head>
<body>
<div class="login-page">
  <div class="login-card">

    <div class="login-header">
      <div class="bnr-label">National Bank of Rwanda</div>
      <h1>Bank Licensing &amp; Compliance Portal</h1>
    </div>

    <div class="login-body">
      <div id="alert-box"></div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label">Email Address <span class="required">*</span></label>
          <input type="email" id="email" class="form-control"
                 placeholder="yourname@institution.rw" required/>
        </div>

        <div class="form-group">
          <label class="form-label">Password <span class="required">*</span></label>
          <input type="password" id="password" class="form-control"
                 placeholder="••••••••" required/>
        </div>

        <button type="submit" id="login-btn" class="btn btn-primary w-full mt-2">
          Sign In
        </button>
      </form>

      <p class="text-muted mt-2" style="text-align:center; font-size:.75rem;">
        Access restricted to authorised BNR staff and registered applicants.
      </p>
    </div>

  </div>
</div>

<script src="/js/main.js"></script>
<script>
  // Redirect if already logged in
  if (Auth.isLoggedIn()) redirectByRole(Auth.user().role);

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const alertBox = document.getElementById('alert-box');
    alertBox.innerHTML = '';
    setLoading(btn, true);

    try {
      const data = await API.post('/api/auth/login', {
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value
      });
      Auth.save(data);
      redirectByRole(data.role);
    } catch (err) {
      setLoading(btn, false);
      showAlert(alertBox, err.message || 'Invalid email or password.', 'error');
    }
  });

  function redirectByRole(role) {
    const routes = {
      APPLICANT: '/applicant/dashboard',
      REVIEWER:  '/reviewer/dashboard',
      APPROVER:  '/approver/dashboard',
      ADMIN:     '/admin/dashboard'
    };
    window.location.href = routes[role] || '/login';
  }
</script>
</body>
</html>
