server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/bnr_licensing
    username: bnr_user
    password: bnr_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/seed.sql
      separator: ;
      continue-on-error: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 10MB

  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

app:
  jwt:
    secret: BNR_JWT_SECRET_KEY_MUST_BE_AT_LEAST_256_BITS_LONG_FOR_SECURITY_2026
    expiration-ms: 3600000
  upload:
    base-dir: ./uploads
  base-url: http://localhost:8080

logging:
  level:
    rw.bnr.licensing: DEBUG
    org.springframework.security: INFO
