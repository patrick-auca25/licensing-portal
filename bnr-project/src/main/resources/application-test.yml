spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  sql:
    init:
      mode: never

app:
  jwt:
    secret: TEST_JWT_SECRET_KEY_MUST_BE_AT_LEAST_256_BITS_FOR_TESTING_PURPOSES
    expiration-ms: 3600000
  upload:
    base-dir: ./test-uploads
