version: '3.8'

services:

  postgres:
    image: postgres:15-alpine
    container_name: bnr_postgres
    environment:
      POSTGRES_DB: bnr_licensing
      POSTGRES_USER: bnr_user
      POSTGRES_PASSWORD: bnr_pass
    ports:
      - "5432:5432"
    volumes:
      - bnr_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bnr_user -d bnr_licensing"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: bnr_app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bnr_licensing
      SPRING_DATASOURCE_USERNAME: bnr_user
      SPRING_DATASOURCE_PASSWORD: bnr_pass
    volumes:
      - bnr_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  bnr_pgdata:
  bnr_uploads:
